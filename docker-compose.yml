services:
  pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: pgvector_agent
    volumes:
      - pgvector_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USERNAME -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis_tess
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"   
    # networks:
    #   - backend_net

  redisinsight:
      image: redis/redisinsight:latest
      container_name: redisinsight_tess
      ports:
        - "5540:5540"
      # networks:
      #   - backend_net
      restart: unless-stopped
volumes:
  pgvector_data: