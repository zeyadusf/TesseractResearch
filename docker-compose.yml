services:
 pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: pgvector_agent
    volumes:
      - pgvector_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USERNAME -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgvector_data: