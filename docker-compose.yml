services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: tesseract_research_app
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: pgvector_agent
    volumes:
      - pgvector_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USERNAME -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis_tess
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_tess
    ports:
      - "5540:5540"
    restart: unless-stopped

volumes:
  pgvector_data: